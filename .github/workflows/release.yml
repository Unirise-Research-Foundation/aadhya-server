name: Release - Build & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - release
      - develop

env:
  NODE_VERSION: 20
  VPS_DOCKER_CONTEXT: vps
  COMPOSE_PROJECT_NAME: ${{ github.ref_name == 'release' && 'aadhya-server-prod' || 'aadhya-server-dev' }}
  TRAEFIK_ENABLE: ${{ github.ref_name == 'release' && 'true' || 'false' }}
  BACKEND_DOMAIN: ${{ github.ref_name == 'release' && 'api.urf.buildstack.space' || 'api-dev.urf.buildstack.space' }}
  BACKEND_DB_NETWORK: urf-backend-network

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Validate production compose config
        run: docker compose -f docker/prod/docker-compose.yml config

  deploy:
    name: Deploy
    if: github.ref_name == 'release' || github.ref_name == 'develop'
    runs-on: ubuntu-latest
    needs: [build]
    environment: ${{ github.ref_name == 'release' && 'production' || 'development' }}
    timeout-minutes: 20
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          KEY_CONTENT="$SSH_PRIVATE_KEY"
          printf '%s' "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/id_key_raw

          if grep -q '\\n' ~/.ssh/id_key_raw; then
            printf '%b' "$(cat ~/.ssh/id_key_raw)" > ~/.ssh/id_key_try
          else
            cp ~/.ssh/id_key_raw ~/.ssh/id_key_try
          fi

          if ! grep -Eq 'BEGIN (OPENSSH|RSA|EC|DSA|ED25519) PRIVATE KEY' ~/.ssh/id_key_try; then
            base64 -d ~/.ssh/id_key_raw > ~/.ssh/id_key_try 2>/dev/null || true
          fi

          mv ~/.ssh/id_key_try ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          rm -f ~/.ssh/id_key_raw

          if ! ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null 2>&1; then
            echo "Invalid SSH private key in KEY secret."
            echo "Store either raw private key content or base64-encoded private key."
            exit 1
          fi

          if [ -z "${SSH_PORT:-}" ]; then SSH_PORT=22; fi
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.HOST }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Verify SSH access to VPS
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          if [ -z "${SSH_PORT:-}" ]; then SSH_PORT=22; fi
          ssh -p "$SSH_PORT" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "${{ secrets.USERNAME }}@${{ secrets.HOST }}" "docker --version && docker compose version"

      - name: Configure Docker SSH context
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          if [ -z "${SSH_PORT:-}" ]; then SSH_PORT=22; fi
          docker context rm "${{ env.VPS_DOCKER_CONTEXT }}" || true
          docker context create "${{ env.VPS_DOCKER_CONTEXT }}" --docker "host=ssh://${{ secrets.USERNAME }}@${{ secrets.HOST }}:$SSH_PORT"
          docker --context "${{ env.VPS_DOCKER_CONTEXT }}" info

      - name: Build and deploy on VPS
        env:
          TRAEFIK_ENABLE: ${{ secrets.TRAEFIK_ENABLE || env.TRAEFIK_ENABLE }}
          BACKEND_DOMAIN: ${{ secrets.BACKEND_DOMAIN || env.BACKEND_DOMAIN }}
          BACKEND_DB_NETWORK: ${{ secrets.BACKEND_DB_NETWORK || env.BACKEND_DB_NETWORK }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -euo pipefail
          for required_var in DATABASE_HOST DATABASE_PORT DATABASE_USERNAME DATABASE_PASSWORD DATABASE_NAME JWT_SECRET; do
            if [ -z "${!required_var:-}" ]; then
              echo "Missing required secret: $required_var"
              exit 1
            fi
          done

          docker --context "${{ env.VPS_DOCKER_CONTEXT }}" compose \
            --project-name "${{ env.COMPOSE_PROJECT_NAME }}" \
            -f docker/prod/docker-compose.yml \
            up -d --build --remove-orphans

      - name: Show deployed services
        run: |
          docker --context "${{ env.VPS_DOCKER_CONTEXT }}" compose \
            --project-name "${{ env.COMPOSE_PROJECT_NAME }}" \
            -f docker/prod/docker-compose.yml \
            ps

      - name: Prune stale images
        run: |
          docker --context "${{ env.VPS_DOCKER_CONTEXT }}" image prune -f --filter "until=168h" || true
